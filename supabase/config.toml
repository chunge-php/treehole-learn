project_id = "treehole-learn"

[api]
enabled = true
port = 46421
schemas = ["public", "storage"]

[db]
port = 46422
shadow_port = 46420
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql", "./seed_assessments.sql"]

# 显式锁定全部端口到 46xxx 段, 避免使用 supabase 默认端口跟其他本地项目 (如 bb365 用 56xxx 段) 冲突
[db.pooler]
enabled = false
port = 46429

[studio]
enabled = true
port = 46423

[inbucket]
enabled = true
port = 46424

[analytics]
enabled = false
port = 46427

[auth]
enabled = true
site_url = "http://localhost:3006"
additional_redirect_urls = ["http://localhost:3006"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true

[storage]
enabled = true
file_size_limit = "50MiB"
